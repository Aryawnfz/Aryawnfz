<svg viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6D28D9"/>
      <stop offset="50%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="15%" r="55%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="85%" cy="85%" r="55%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <filter id="frost" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <clipPath id="card">
      <rect x="60" y="40" width="1080" height="240" rx="42"/>
    </clipPath>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="45%" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="55%" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="320" fill="url(#bg)"/>
  <circle cx="240" cy="70" r="260" fill="url(#glow1)"/>
  <circle cx="1000" cy="260" r="260" fill="url(#glow2)"/>

  <g clip-path="url(#card)">
    <rect x="60" y="40" width="1080" height="240" fill="#ffffff" opacity="0.10"/>
    <g filter="url(#frost)" opacity="0.55">
      <circle cx="240" cy="70" r="260" fill="#ffffff" opacity="0.35"/>
      <circle cx="1000" cy="260" r="260" fill="#22D3EE" opacity="0.35"/>
    </g>
    <g transform="skewX(-18)">
      <rect x="-260" y="-40" width="200" height="420" fill="url(#shine)">
        <animateTransform attributeName="transform" type="translate" from="-100 0" to="1500 0" dur="5s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>

  <rect x="60" y="40" width="1080" height="240" rx="42" fill="none" stroke="#ffffff" stroke-opacity="0.45" stroke-width="2"/>
  <path d="M100 44 Q600 18 1140 44" stroke="#ffffff" stroke-opacity="0.5" stroke-width="2" fill="none"/>

  <text x="600" y="155" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="56" font-weight="700" fill="#ffffff">Aryan Firoozzareh</text>
  <text x="600" y="200" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="22" fill="#E5E7EB">Python Developer • Web Scraping &amp; Automation Specialist</text>

  <g>
    <rect x="470" y="225" width="260" height="38" rx="19" fill="#ffffff" opacity="0.15" stroke="#ffffff" stroke-opacity="0.45"/>
    <text x="600" y="251" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="17" fill="#ffffff">📍 Tehran, Iran 🇮🇷</text>
  </g>
</svg>
