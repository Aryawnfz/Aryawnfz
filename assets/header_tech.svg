
<svg viewBox="0 0 380 56" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="hbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1D4ED8"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
    <linearGradient id="hglass" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="hstroke" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.15"/>
    </linearGradient>
    <filter id="hglow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="hclip">
      <rect width="380" height="56" rx="28"/>
    </clipPath>
  </defs>
  <g clip-path="url(#hclip)">
    <rect width="380" height="56" fill="url(#hbg)"/>
    <rect width="380" height="56" fill="url(#hglass)"/>
    <rect x="1" y="1" width="378" height="22" rx="22" fill="#ffffff" opacity="0.10"/>
  </g>
  <rect width="379" height="55" x="0.5" y="0.5" rx="27.5" fill="none" stroke="url(#hstroke)" stroke-width="1.2"/>
  <circle cx="28" cy="28" r="11" fill="#ffffff" opacity="0.15" filter="url(#hglow)"/>
  <text x="28" y="35" text-anchor="middle" font-size="18">🛠️</text>
  <text x="200" y="35" text-anchor="middle" font-family="Segoe UI, SF Pro Display, Helvetica Neue, Arial, sans-serif" font-size="20" font-weight="700" fill="#ffffff" letter-spacing="0.3">Tech Stack</text>
</svg>