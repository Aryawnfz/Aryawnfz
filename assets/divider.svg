<svg viewBox="0 0 1200 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="dgrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6D28D9" stop-opacity="0">
        <animate attributeName="stop-color" values="#6D28D9;#4338CA;#0EA5E9;#6D28D9" dur="10s" repeatCount="indefinite"/>
      </stop>
      <stop offset="30%" stop-color="#6D28D9">
        <animate attributeName="stop-color" values="#6D28D9;#818CF8;#22D3EE;#6D28D9" dur="10s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#4F46E5">
        <animate attributeName="stop-color" values="#4F46E5;#A78BFA;#38BDF8;#4F46E5" dur="10s" repeatCount="indefinite"/>
      </stop>
      <stop offset="70%" stop-color="#0EA5E9">
        <animate attributeName="stop-color" values="#0EA5E9;#6D28D9;#818CF8;#0EA5E9" dur="10s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0">
        <animate attributeName="stop-color" values="#0EA5E9;#4F46E5;#6D28D9;#0EA5E9" dur="10s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <linearGradient id="sweepShine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="bubbleGlow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="lineClip">
      <rect x="0" y="13" width="1200" height="6" rx="3"/>
    </clipPath>
  </defs>

  <!-- Main line -->
  <g clip-path="url(#lineClip)">
    <rect x="0" y="13" width="1200" height="6" fill="url(#dgrad)" opacity="0.70"/>
    <!-- Travelling shine sweep -->
    <rect x="-200" y="13" width="200" height="6" fill="url(#sweepShine)">
      <animateTransform attributeName="transform" type="translate" from="-200 0" to="1400 0" dur="3.2s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Floating bubbles (6 of them, different sizes, speeds, positions) -->
  <!-- Bubble 1 -->
  <circle cy="16" r="4.5" fill="#A78BFA" opacity="0.85" filter="url(#bubbleGlow)">
    <animate attributeName="cx" from="-10" to="1210" dur="7s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="16;11;16;20;16" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.85;0.85;0.85;0" keyTimes="0;0.05;0.5;0.95;1" dur="7s" repeatCount="indefinite"/>
  </circle>

  <!-- Bubble 2 -->
  <circle cy="16" r="3" fill="#38BDF8" opacity="0.80" filter="url(#bubbleGlow)">
    <animate attributeName="cx" from="-10" to="1210" dur="5.5s" begin="1.8s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="16;20;16;12;16" dur="2.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.80;0.80;0.80;0" keyTimes="0;0.05;0.5;0.95;1" dur="5.5s" begin="1.8s" repeatCount="indefinite"/>
  </circle>

  <!-- Bubble 3 -->
  <circle cy="16" r="5.5" fill="#ffffff" opacity="0.70" filter="url(#bubbleGlow)">
    <animate attributeName="cx" from="-10" to="1210" dur="9s" begin="0.5s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="16;10;16;22;16" dur="4.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.70;0.70;0.70;0" keyTimes="0;0.05;0.5;0.95;1" dur="9s" begin="0.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Bubble 4 -->
  <circle cy="16" r="2.5" fill="#818CF8" opacity="0.90" filter="url(#bubbleGlow)">
    <animate attributeName="cx" from="-10" to="1210" dur="6s" begin="3.2s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="16;13;16;19;16" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.90;0.90;0.90;0" keyTimes="0;0.05;0.5;0.95;1" dur="6s" begin="3.2s" repeatCount="indefinite"/>
  </circle>

  <!-- Bubble 5 -->
  <circle cy="16" r="3.8" fill="#22D3EE" opacity="0.75" filter="url(#bubbleGlow)">
    <animate attributeName="cx" from="-10" to="1210" dur="8s" begin="4.5s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="16;21;16;11;16" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.75;0.75;0.75;0" keyTimes="0;0.05;0.5;0.95;1" dur="8s" begin="4.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Bubble 6 — large soft -->
  <circle cy="16" r="7" fill="#C4B5FD" opacity="0.45" filter="url(#bubbleGlow)">
    <animate attributeName="cx" from="-10" to="1210" dur="11s" begin="2s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="16;9;16;23;16" dur="5.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.45;0.45;0.45;0" keyTimes="0;0.05;0.5;0.95;1" dur="11s" begin="2s" repeatCount="indefinite"/>
  </circle>
</svg>
