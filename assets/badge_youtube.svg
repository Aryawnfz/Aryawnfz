<svg viewBox="0 0 170 44" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#991B1B"/>
      <stop offset="100%" stop-color="#FF0000"/>
    </linearGradient>
    <linearGradient id="glass" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="stroke" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.80"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.18"/>
    </linearGradient>
    <clipPath id="clip"><rect width="170" height="44" rx="22"/></clipPath>
      <radialGradient id="pulse" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#FECDD3" stop-opacity="0.85"/>
      <stop offset="60%" stop-color="#FECDD3" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#FECDD3" stop-opacity="0"/>
    </radialGradient>
    <filter id="innerShadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feFlood flood-color="#000000" flood-opacity="0.55" result="black"/>
      <feComposite in="black" in2="SourceAlpha" operator="out" result="outside"/>
      <feGaussianBlur in="outside" stdDeviation="3" result="blurOut"/>
      <feComposite in="blurOut" in2="SourceAlpha" operator="in" result="shadowIn"/>
      <feMerge>
        <feMergeNode in="SourceGraphic"/>
        <feMergeNode in="shadowIn"/>
      </feMerge>
    </filter>
    <filter id="rimBlur" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3.4"/>
    </filter>
  </defs>
  <!-- Colored rim glow halo - ambient light the glass edge catches -->
  <rect x="-3" y="-3" width="176" height="50" rx="25" fill="none" stroke="#FB7185" stroke-width="3.4" opacity="0.55" filter="url(#rimBlur)"/>

  <g clip-path="url(#clip)" filter="url(#innerShadow)">
    <rect width="170" height="44" rx="22" fill="url(#bg)"/>
    <rect width="170" height="44" rx="22" fill="url(#glass)"/>
    <rect x="0" y="0" width="170" height="18" rx="18" fill="#ffffff" opacity="0.08"/>
  
    <!-- Pulsing inner light - liquid glass breathes -->
    <ellipse cx="24" cy="17" rx="28" ry="22" fill="url(#pulse)">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="3.8s" repeatCount="indefinite"/>
      <animate attributeName="rx" values="23.8;33.0;23.8" dur="3.8s" repeatCount="indefinite"/>
    </ellipse>
  </g>
  <rect width="169" height="43" x="0.5" y="0.5" rx="21.5" fill="none" stroke="url(#stroke)" stroke-width="1"/>
  <!-- YouTube play button -->
  <g transform="translate(12, 9)">
    <rect width="24" height="17" rx="4.5" fill="#ffffff" opacity="0.90"/>
    <polygon points="9,4.5 9,12.5 18,8.5" fill="#CC0000"/>
  </g>
  <text x="96" y="28" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="14" font-weight="600" fill="#ffffff" letter-spacing="0.3">YouTube</text>
</svg>
