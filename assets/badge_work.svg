<svg viewBox="0 0 260 44" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4C1D95"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="glass" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="stroke" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.80"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.18"/>
    </linearGradient>
    <linearGradient id="divider" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.60"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.15"/>
    </linearGradient>
    <clipPath id="clip"><rect width="260" height="44" rx="22"/></clipPath>
      <radialGradient id="pulse" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#DDD6FE" stop-opacity="0.85"/>
      <stop offset="60%" stop-color="#DDD6FE" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#DDD6FE" stop-opacity="0"/>
    </radialGradient>
    <filter id="innerShadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feFlood flood-color="#000000" flood-opacity="0.55" result="black"/>
      <feComposite in="black" in2="SourceAlpha" operator="out" result="outside"/>
      <feGaussianBlur in="outside" stdDeviation="3" result="blurOut"/>
      <feComposite in="blurOut" in2="SourceAlpha" operator="in" result="shadowIn"/>
      <feMerge>
        <feMergeNode in="SourceGraphic"/>
        <feMergeNode in="shadowIn"/>
      </feMerge>
    </filter>
    <filter id="rimBlur" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3.4"/>
    </filter>
  </defs>
  <!-- Colored rim glow halo - ambient light the glass edge catches -->
  <rect x="-3" y="-3" width="266" height="50" rx="25" fill="none" stroke="#A78BFA" stroke-width="3.4" opacity="0.55" filter="url(#rimBlur)"/>

  <g clip-path="url(#clip)" filter="url(#innerShadow)">
    <rect width="260" height="44" rx="22" fill="url(#bg)"/>
    <rect width="260" height="44" rx="22" fill="url(#glass)"/>
    <rect x="0" y="0" width="260" height="18" rx="18" fill="#ffffff" opacity="0.08"/>
  
    <!-- Pulsing inner light - liquid glass breathes -->
    <ellipse cx="185" cy="22" rx="46" ry="24" fill="url(#pulse)">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="4.2s" repeatCount="indefinite"/>
      <animate attributeName="rx" values="39.1;54.3;39.1" dur="4.2s" repeatCount="indefinite"/>
    </ellipse>
  </g>
  <rect width="259" height="43" x="0.5" y="0.5" rx="21.5" fill="none" stroke="url(#stroke)" stroke-width="1"/>
  <!-- Label section left -->
  <text x="16" y="28" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="12" font-weight="500" fill="#DDD6FE" letter-spacing="0.4">Currently at</text>
  <!-- Divider line -->
  <line x1="104" y1="10" x2="104" y2="34" stroke="url(#divider)" stroke-width="1"/>
  <!-- Value -->
  <text x="122" y="28" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="14" font-weight="700" fill="#ffffff" letter-spacing="0.3">💼 SorinData</text>
</svg>
